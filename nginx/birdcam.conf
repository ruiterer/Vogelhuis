# Birdcam nginx site configuration
# Installed to /etc/nginx/sites-available/birdcam

# Rate limiting zone for snapshot endpoint
limit_req_zone $binary_remote_addr zone=snapshot:1m rate=10r/m;

server {
    listen 80 default_server;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # No directory listing
    autoindex off;

    # HLS segments — served directly from tmpfs, bypass Python
    location /hls/ {
        alias /dev/shm/birdcam/;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
        add_header Cache-Control "no-cache, no-store";
        add_header Access-Control-Allow-Origin *;
    }

    # Snapshot downloads — served directly from disk
    location /snapshots/ {
        alias /var/lib/birdcam/snapshots/;
        autoindex off;
    }

    # Snapshot API — rate limited
    location /api/snapshot {
        limit_req zone=snapshot burst=3 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # All other requests — proxy to Flask
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
