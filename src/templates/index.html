{% extends "base.html" %}
{% block subtitle %}Live{% endblock %}
{% block content %}
<div class="stream-container">
    <div class="video-wrapper">
        <video id="video-player" playsinline muted autoplay></video>
        <div id="camera-status" class="status-badge">Connecting...</div>
    </div>
    <div class="stream-controls">
        <div class="stream-info">
            <span id="clock"></span>
            <span id="stream-res">{{ config.stream.resolution }} · {{ config.stream.framerate }}fps</span>
        </div>
        <div class="stream-actions">
            <button id="btn-snapshot" class="btn" title="Take snapshot">Snapshot</button>
            <button id="btn-fullscreen" class="btn" title="Fullscreen">Fullscreen</button>
            <button id="btn-light" class="btn gpio-toggle" data-target="light" title="Toggle light">Light</button>
            <button id="btn-ir-light" class="btn gpio-toggle" data-target="ir-light" title="Toggle IR light">IR Light</button>
            <button id="btn-fan" class="btn gpio-toggle" data-target="fan" title="Toggle fan">Fan</button>
        </div>
    </div>
    <div class="sensor-readings" id="sensor-readings">
        <span class="sensor-item" id="sr-temp" title="Birdhouse temperature">Temp: --</span>
        <span class="sensor-item" id="sr-humidity" title="Birdhouse humidity">Humidity: --</span>
        <span class="sensor-item" id="sr-cpu" title="CPU temperature">CPU: --</span>
        <span class="sensor-item" id="sr-motion" title="Motion status">Motion: --</span>
    </div>
    <div id="snapshot-toast" class="toast hidden"></div>
</div>

<div class="snapshots-section">
    <h2>Recent Snapshots</h2>
    <div id="snapshots-list" class="snapshots-grid"></div>
</div>
{% endblock %}
